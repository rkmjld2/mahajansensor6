<!DOCTYPE html>
<html>
<head>
<title>ESP8266 Dashboard</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
}

.container {
    width: 90%;
    margin: auto;
    text-align: center;
}

h2 {
    background: #1976d2;
    color: white;
    padding: 15px;
}

button {
    padding: 10px 20px;
    margin: 5px;
    font-size: 16px;
}

input, select {
    padding: 10px;
    margin: 5px;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th {
    background: #1976d2;
    color: white;
    padding: 10px;
}

td {
    padding: 8px;
    text-align: center;
}

canvas {
    margin-top: 20px;
    background: white;
    padding: 10px;
}
</style>

<script>
let chart;

// -------- START / STOP --------
async function start(){ await fetch('/start'); }
async function stop(){ await fetch('/stop'); }

// -------- LOAD DATA --------
async function loadData(){
    let res = await fetch('/data');
    let data = await res.json();
    showData(data);
}

// -------- STATUS --------
async function status(){
    let res = await fetch('/status');
    let d = await res.json();
    document.getElementById("status").innerText = d.status;
}

// -------- SHOW TABLE --------
function showData(data){
    let tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    data.forEach(r => {
        let row = `<tr>
            <td>${r.id || ""}</td>
            <td>${r.sensor1 || ""}</td>
            <td>${r.sensor2 || ""}</td>
            <td>${r.sensor3 || ""}</td>
            <td>${r.timestamp || ""}</td>
        </tr>`;
        tbody.innerHTML += row;
    });
}

// -------- SEARCH --------
async function search(){
    let start = document.getElementById("start").value;
    let end = document.getElementById("end").value;

    let res = await fetch('/search', {
        method: "POST",
        headers: {"Content-Type":"application/x-www-form-urlencoded"},
        body: `start=${start}&end=${end}`
    });

    let data = await res.json();
    showData(data);
}

// -------- GRAPH --------
async function drawChart(){

    let start = document.getElementById("start").value;
    let end = document.getElementById("end").value;
    let type = document.getElementById("chartType").value;

    let res = await fetch('/search', {
        method: "POST",
        headers: {"Content-Type":"application/x-www-form-urlencoded"},
        body: `start=${start}&end=${end}`
    });

    let data = await res.json();

    let labels = data.map(d => d.timestamp);
    let s1 = data.map(d => d.sensor1);
    let s2 = data.map(d => d.sensor2);
    let s3 = data.map(d => d.sensor3);

    if(chart) chart.destroy();

    let ctx = document.getElementById("myChart").getContext("2d");

    chart = new Chart(ctx, {
        type: type,
        data: {
            labels: labels,
            datasets: [
                { label: "Sensor 1", data: s1, borderWidth: 2 },
                { label: "Sensor 2", data: s2, borderWidth: 2 },
                { label: "Sensor 3", data: s3, borderWidth: 2 }
            ]
        }
    });
}

// -------- DOWNLOAD --------
function downloadCSV(){
    let start = document.getElementById("start").value;
    let end = document.getElementById("end").value;

    fetch('/download', {
        method: "POST",
        headers: {"Content-Type":"application/x-www-form-urlencoded"},
        body: `start=${start}&end=${end}`
    })
    .then(res => res.blob())
    .then(blob => {
        let url = window.URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = "sensor_data.csv";
        a.click();
    });
}

// -------- CUSTOM QUERY --------
async function runQuery(){
    let q = document.getElementById("query").value;

    let res = await fetch('/query', {
        method:"POST",
        headers: {"Content-Type":"application/x-www-form-urlencoded"},
        body:`query=${q}`
    });

    let data = await res.json();

    if (Array.isArray(data)) {
        showData(data);
    } else {
        alert("✔ " + data.message + "\nRows: " + data.rows_affected);
        loadData();
    }
}

// -------- AUTO REFRESH --------
setInterval(loadData, 5000);
setInterval(status, 3000);
</script>

</head>

<body>

<div class="container">

<h2>ESP8266 Sensor Dashboard</h2>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<h3>Status: <span id="status">Checking...</span></h3>

<!-- SEARCH -->
<h3>Search by Date</h3>
<input type="datetime-local" id="start">
<input type="datetime-local" id="end">
<button onclick="search()">Search</button>

<!-- GRAPH -->
<h3>Graph</h3>
<select id="chartType">
    <option value="line">Line</option>
    <option value="bar">Bar</option>
    <option value="pie">Pie</option>
</select>

<button onclick="drawChart()">Draw Graph</button>
<button onclick="downloadCSV()">Download CSV</button>

<canvas id="myChart"></canvas>

<!-- CUSTOM QUERY -->
<h3>Custom Query</h3>
<input type="text" id="query" style="width:400px;">
<button onclick="runQuery()">Run</button>

<!-- TABLE -->
<table border="1">
<thead>
<tr>
<th>ID</th><th>S1</th><th>S2</th><th>S3</th><th>Date</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Sensor Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family: Arial; background:#f5f5f5;">

<div style="
    width:90%;
    max-width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
">

<h2 style="text-align:center;">Sensor Dashboard</h2>

<!-- CONTROL -->
<button onclick="control('start')">Start</button>
<button onclick="control('stop')">Stop</button>

<h3>Status</h3>
<div id="status"></div>

<hr>

<!-- SEARCH -->
<h3>Search</h3>
From <input type="date" id="start">
To <input type="date" id="end">

<button onclick="search()">Search</button>
<button onclick="download()">Download</button>
<button onclick="loadAll()">Show All</button>

<hr>


<h3>Query Box</h3>

<input type="text" id="query" placeholder="Enter query here" style="width:70%">
<button onclick="runQuery()">Run Query</button>

<p>
Examples:<br>
select *<br>
delete id=5<br>
delete between 2026-04-01 and 2026-04-03
</p>
<!-- GRAPH -->
<canvas id="chart" height="100"></canvas>

<hr>

<!-- TABLE -->
<table border="1" width="100%" style="border-collapse:collapse; text-align:center;">
<thead style="background:#007BFF; color:white;">
<tr>
<th>ID</th><th>S1</th><th>S2</th><th>S3</th><th>Date</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

</div>

<script>

const base = "https://mahajansensor6.onrender.com";

// ---------- LOAD ALL ----------
function loadAll(){
 fetch(base + "/api/all")
 .then(r=>r.json())
 .then(show);
}

// ---------- SHOW TABLE ----------
function show(d){
 let html="";
 d.forEach(r=>{
  html+=`<tr>
  <td>${r.id}</td>
  <td>${r.sensor1}</td>
  <td>${r.sensor2}</td>
  <td>${r.sensor3}</td>
  <td>${r.date}</td>
  </tr>`;
 });
 document.getElementById("data").innerHTML = html;
}

// ---------- STATUS ----------
function status(){
 fetch(base + "/api/status")
 .then(r=>r.json())
 .then(d=>{
   document.getElementById("status").innerHTML =
   "Receiving: " + d.receiving +
   "<br>ESP Connected: " + d.esp_connected +
   "<br>Last Seen: " + d.last_seen;
 });
}

// ---------- CONTROL ----------
function control(a){
 fetch(base + "/api/control?action=" + a);
}

// ---------- SEARCH ----------
function search(){
 let s = document.getElementById("start").value;
 let e = document.getElementById("end").value;

 fetch(`${base}/api/search?start=${s}&end=${e}`)
 .then(r=>r.json())
 .then(d=>{
   show(d);
   drawGraph(d);
 });
}

// ---------- DOWNLOAD ----------
function download(){
 let s = document.getElementById("start").value;
 let e = document.getElementById("end").value;

 window.location = `${base}/api/download?start=${s}&end=${e}`;
}

// ---------- GRAPH ----------
let chart;

function drawGraph(d){

 let labels = d.map(x=>x.date);
 let s1 = d.map(x=>x.sensor1);
 let s2 = d.map(x=>x.sensor2);
 let s3 = d.map(x=>x.sensor3);

 if(chart) chart.destroy();

 chart = new Chart(document.getElementById("chart"), {
   type: 'line',
   data: {
     labels: labels,
     datasets: [
       {label:"Sensor1", data:s1},
       {label:"Sensor2", data:s2},
       {label:"Sensor3", data:s3}
     ]
   }
 });
}

// ---------- AUTO REFRESH ----------
setInterval(loadAll, 5000);
setInterval(status, 5000);

// first load
loadAll();
status();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Sensor Dashboard</title>
</head>
<body>

<h2>Sensor Dashboard</h2>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<h3>Status:</h3>
<div id="status"></div>

<h3>Search</h3>
From: <input type="date" id="start">
To: <input type="date" id="end">
<button onclick="search()">Search</button>

<table border="1">
<thead>
<tr>
<th>ID</th><th>S1</th><th>S2</th><th>S3</th><th>Date</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<script>
const base = "https://mahajansensor6.onrender.com";

function loadData(){
    fetch(base + "/api/all")
    .then(r=>r.json())
    .then(d=>{
        let html="";
        d.forEach(row=>{
            html += `<tr>
            <td>${row.id}</td>
            <td>${row.sensor1}</td>
            <td>${row.sensor2}</td>
            <td>${row.sensor3}</td>
            <td>${row.date}</td>
            </tr>`;
        });
        document.getElementById("data").innerHTML = html;
    });
}

function search(){
    let s = document.getElementById("start").value;
    let e = document.getElementById("end").value;

    fetch(`${base}/api/search?start=${s}&end=${e}`)
    .then(r=>r.json())
    .then(d=>{
        let html="";
        d.forEach(row=>{
            html += `<tr>
            <td>${row.id}</td>
            <td>${row.sensor1}</td>
            <td>${row.sensor2}</td>
            <td>${row.sensor3}</td>
            <td>${row.date}</td>
            </tr>`;
        });
        document.getElementById("data").innerHTML = html;
    });
}

function start(){
    fetch(base + "/api/control?action=start");
}

function stop(){
    fetch(base + "/api/control?action=stop");
}

function status(){
    fetch(base + "/api/status")
    .then(r=>r.json())
    .then(d=>{
        document.getElementById("status").innerHTML =
        "Receiving: " + d.receiving +
        "<br>ESP: " + d.esp_status +
        "<br>Last Seen: " + d.last_seen;
    });
}

setInterval(loadData, 5000);
setInterval(status, 5000);
</script>

</body>
</html>

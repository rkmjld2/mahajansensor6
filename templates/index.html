<!DOCTYPE html>
<html>
<head>
    <title>Sensor Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: auto;
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        h1 {
            margin-bottom: 10px;
        }

        #status {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background: #007bff;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .start { background: green; }
        .stop { background: red; }
    </style>
</head>

<body>

<div class="container">

    <h1>📡 Sensor Monitoring System</h1>

    <!-- STATUS -->
    <div id="status">🔴 DISCONNECTED</div>

    <!-- BUTTONS -->
    <button class="start" onclick="start()">START</button>
    <button class="stop" onclick="stop()">STOP</button>

    <h3>Live Data</h3>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Sensor1</th>
                <th>Sensor2</th>
                <th>Sensor3</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody id="tableBody">
        </tbody>
    </table>

</div>

<script>

// =========================
// STATUS CHECK
// =========================
function checkStatus() {

    fetch('/api/status')
    .then(res => res.json())
    .then(data => {

        let el = document.getElementById("status");

        if (data.status === "CONNECTED") {
            el.innerHTML = "🟢 CONNECTED";
            el.style.color = "green";
        } else {
            el.innerHTML = "🔴 DISCONNECTED";
            el.style.color = "red";
        }

    })
    .catch(err => {
        document.getElementById("status").innerHTML = "⚠️ SERVER ERROR";
    });
}

// =========================
// LOAD DATA
// =========================
function loadData() {

    fetch('/api/all')
    .then(res => res.json())
    .then(data => {

        let table = document.getElementById("tableBody");
        table.innerHTML = "";

        data.reverse().forEach(row => {

            let tr = `<tr>
                <td>${row.id}</td>
                <td>${row.sensor1}</td>
                <td>${row.sensor2}</td>
                <td>${row.sensor3}</td>
                <td>${row.date}</td>
            </tr>`;

            table.innerHTML += tr;
        });
    });
}

// =========================
// START / STOP (UI ONLY)
// =========================
let receiving = true;

function start() {
    receiving = true;
    document.getElementById("status").innerHTML = "🟢 STARTED";
}

function stop() {
    receiving = false;
    document.getElementById("status").innerHTML = "🔴 STOPPED";
}

// =========================
// AUTO REFRESH
// =========================
setInterval(() => {
    checkStatus();

    if (receiving) {
        loadData();
    }

}, 3000);

</script>

</body>
</html>
